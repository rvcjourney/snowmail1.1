version: "3.8"
name: snov-backend

services:
  snov-tool:
    build: .
    container_name: backsnow
    ports:
      - "3017:3017"   # Flask/Gunicorn — must be open in Hostinger VPS firewall
    environment:
      - PYTHONUNBUFFERED=1
      - FLASK_ENV=production
      - PLAYWRIGHT_HEADLESS=true
      - FLASK_DEBUG=false
    volumes:
      - ./logs:/app/logs
    restart: unless-stopped
    shm_size: 2gb
    ulimits:
      nofile:
        soft: 65536
        hard: 65536
    stop_grace_period: 80s
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3017/"]
      interval: 30s
      timeout: 30s
      retries: 3
      start_period: 60s
    networks:
      - snov-tool-network

networks:
  snov-tool-network:
    driver: bridge